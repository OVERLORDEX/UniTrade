<nav class="navbar">
  <div class="navbar-container">
    <a routerLink="/" class="logo">
      <span class="logo-badge">U</span>
      <span class="logo-text">UniTrade</span>
    </a>

    <div class="nav-center">
      <a routerLink="/listings" routerLinkActive="active-link">Listings</a>
      <a routerLink="/favorites" routerLinkActive="active-link">Favorites</a>

      @if (authService.isAuthenticated()) {
        <a routerLink="/create-listing" routerLinkActive="active-link">Create Listing</a>
        <a routerLink="/my-listings" routerLinkActive="active-link">My Listings</a>
      }
    </div>

    <div class="nav-right">
      @if (authService.isAuthenticated()) {
        <a routerLink="/profile" class="profile-link">Profile</a>
        <button class="logout-btn" (click)="logout()">Logout</button>
      } @else {
        <a routerLink="/login" class="login-link">Login</a>
        <a routerLink="/register" class="register-link">Register</a>
      }
    </div>
  </div>
</nav>
